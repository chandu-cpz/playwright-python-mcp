name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v3

      - run: uv run ruff check .
      - run: uv run ty check
      - run: uv run mypy .
      - run: uv run pytest
      - run: uv run playwright install --with-deps chromium
      - run: npm ci
        working-directory: tests/conformance/upstream
      - run: npx playwright test --workers=10
        working-directory: tests/conformance/upstream
      - run: uv build
      - run: python -m venv /tmp/pw-mcp-smoke
      - run: /tmp/pw-mcp-smoke/bin/python -m pip install dist/*.whl
      - run: /tmp/pw-mcp-smoke/bin/playwright-python-mcp --help
      - run: /tmp/pw-mcp-smoke/bin/python -m playwright_python_mcp --help
